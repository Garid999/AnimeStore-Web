<!DOCTYPE html>
<html lang="mn">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Anime Store - Монголын аниме фэшн дэлгүүр. Demon Slayer, Bleach, Chainsaw Man, Attack on Titan болон бусад аниме цамцнууд.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Anime Store">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Open Graph -->
  <meta property="og:title" content="Anime Store - Монголын аниме фэшн">
  <meta property="og:description" content="Аниме фэшн цамц, хувцас захиалах дэлгүүр">
  <meta property="og:type" content="website">

  <!-- Theme color -->
  <meta name="theme-color" content="#990011">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Anime Store</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      background-color: #FCF6F5;
    }
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #FCF6F5;
      z-index: 9999;
    }
    #loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(153,0,17,0.15);
      border-top-color: #990011;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading-title {
      margin-top: 16px;
      font-family: sans-serif;
      font-size: 20px;
      font-weight: 900;
      color: #990011;
      letter-spacing: 1px;
    }
    #loading-subtitle {
      margin-top: 6px;
      font-family: sans-serif;
      font-size: 12px;
      color: #888;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div id="loading-spinner"></div>
    <div id="loading-title">Anime Store</div>
    <div id="loading-subtitle">Монголын аниме фэшн дэлгүүр</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById('loading');
      if (loading) {
        loading.style.opacity = '0';
        loading.style.transition = 'opacity 0.4s ease';
        setTimeout(function() { loading.remove(); }, 400);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
